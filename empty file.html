<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Image</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f3f3f3;
            padding: 20px;
        }
        .fullscreen-img {
            max-width: 550px;
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
            display: block;
        }
        @media (max-width: 600px) {
            .fullscreen-img {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <img src="hello.jpeg" class="fullscreen-img" alt="Shared Image">
</body>
</html>
